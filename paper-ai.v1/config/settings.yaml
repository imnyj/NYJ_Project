# ============================================================================
# paper-ai global settings
# ============================================================================

project:
  name: paper-ai
  version: "0.1.0"
  description: "Multi-Agent LLM paper writer"

# Project filesystem layout.
#
# NOTE: This section is DOCUMENTATION only. The runtime path resolver in
# `core/paths.py` defines the layout programmatically — editing values here
# does NOT change where the code reads or writes. Two things are honoured at
# runtime: (1) `PAPER_AI_ROOT` env var for the project root, (2) the `output`
# directory sits directly under root. Everything else is fixed so that
# commander/worker interactions use the same paths across processes.
# Keep this block in sync when you move the on-disk layout.
paths:
  root: "."                        # overridden by PAPER_AI_ROOT env
  prompts: "prompts"
  skills: "skills"
  output: "output"
  snapshots: "output/snapshots"
  upgrade_log: "output/upgrade_log"
  sessions: "output/sessions"
  drafts: "output/drafts"
  figures: "output/figures"
  code: "output/code"
  final: "output/final"
  cache: "output/.cache"

# Which 6 agents are active (after 9→6 consolidation)
agents:
  - commander
  - idea
  - librarian
  - experimenter      # merged: experiment + coder
  - reviewer          # merged: validator + proofreader
  - writer            # LaTeX integration + figure rendering via code_executor

# Librarian SCIE whitelist (enforced by tools/web_search.py in Phase 3)
librarian:
  allowed_publishers:
    - ieeexplore.ieee.org
    - sciencedirect.com
    - dl.acm.org
    - nature.com
    - mdpi.com
    - link.springer.com
    - onlinelibrary.wiley.com
    - tandfonline.com
    - journals.aps.org
    - academic.oup.com
    - cambridge.org
  blocked_sources:
    - arxiv.org
    - biorxiv.org
    - researchgate.net
    - academia.edu
    - scopus.com
    - scholar.google.com

logging:
  level: INFO                      # overridden by PAPER_AI_LOG_LEVEL env
  format: json                     # structured logs for later parsing
  file: output/paper-ai.log
  max_bytes: 10485760              # 10 MB rotation
  backup_count: 5
